<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | 刻音 -Tokine-</title>
  <meta name="description" content="刻音(Tokine)へのお問い合わせ。AIチャットボット組み込み・LP/ホームページ制作・Webアプリ開発のご相談、お見積もりを承ります。">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='75' font-size='80' font-family='serif'%3E刻%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">刻音<span class="nav-logo-sub">TOKINE</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/services">Services</a></li>
      <li><a href="/works">Works</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header class="page-header inverted">
    <p class="eyebrow">— Contact —</p>
    <h1>お問い合わせ</h1>
    <div class="section-divider"></div>
    <p class="lead">ご相談・お見積もりを承ります。要件が固まっていない段階でも構いません。<br>下記フォームよりお気軽にお問い合わせください。通常1営業日以内にご返信いたします。</p>
  </header>

  <!-- Form -->
  <section class="section form-section">
    <form id="contactForm" class="contact-form reveal">
      <!-- Web3Forms: 無料のフォーム送信サービス。下のキーを発行して差し替えると送信が有効になります。 -->
      <input type="hidden" name="access_key" value="485b122d-bb9d-4305-9f80-c2aed1db030d">
      <input type="hidden" name="subject" value="【tokinets.com】お問い合わせ">
      <input type="hidden" name="from_name" value="刻音 お問い合わせフォーム">
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

      <div class="field">
        <label for="name">お名前 <span class="req">*</span></label>
        <input id="name" type="text" name="name" required placeholder="山田 太郎">
      </div>
      <div class="field">
        <label for="email">メールアドレス <span class="req">*</span></label>
        <input id="email" type="email" name="email" required placeholder="example@mail.com">
      </div>
      <div class="field">
        <label for="topic">ご相談内容</label>
        <select id="topic" name="ご相談内容">
          <option>AIチャットボット組み込み</option>
          <option>LP・ホームページ制作</option>
          <option>Webアプリ・業務ツール開発</option>
          <option>その他・未定</option>
        </select>
      </div>
      <div class="field">
        <label for="message">メッセージ <span class="req">*</span></label>
        <textarea id="message" name="message" required placeholder="ご相談内容、ご希望の納期やご予算などをご記入ください。"></textarea>
      </div>

      <button type="submit" class="btn btn-fill">
        送信する
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div id="formStatus" class="form-status"></div>

      <p class="form-note">
        フォームが使えない場合は、<a href="mailto:official@tokinets.com">official@tokinets.com</a> まで直接ご連絡ください。
      </p>
    </form>
  </section>

  <footer>
    <span class="footer-logo">刻音</span>
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/services">Services</a>
      <a href="/works">Works</a>
      <a href="/privacy.html">Privacy</a>
    </div>
    <span class="footer-copy">&copy; 2026 Tokine</span>
  </footer>

  <script>
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    const form = document.getElementById('contactForm');
    const statusEl = document.getElementById('formStatus');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type=submit]');
      statusEl.className = 'form-status';
      btn.disabled = true;
      try {
        const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(form) });
        const json = await res.json();
        if (json.success) {
          form.reset();
          statusEl.className = 'form-status ok';
          statusEl.textContent = 'お問い合わせを受け付けました。通常1営業日以内にご返信いたします。';
        } else { throw new Error(json.message || 'failed'); }
      } catch (err) {
        statusEl.className = 'form-status err';
        statusEl.textContent = '送信に失敗しました。お手数ですが official@tokinets.com まで直接ご連絡ください。';
      } finally { btn.disabled = false; }
    });
  </script>

</body>
</html>
